<div class="login-wrapper">
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="logo">🎓</div>
      <h1>AbsENS</h1>
      <p>Gestion des Absences — ENS Meknès</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          placeholder="admin@ens.ma"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          placeholder="••••••••"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          required
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="loading()">
        @if (loading()) {
          <span>Connexion...</span>
        } @else {
          <span>Se connecter</span>
        }
      </button>

    </form>

    <!-- Hints -->
    <div class="login-hints">
      <p><strong>Admin :</strong> admin&#64;ens.ma / admin123</p>
      <p><strong>Enseignant :</strong> benali&#64;ens.ma / 123456</p>
    </div>

  </div>
</div>
